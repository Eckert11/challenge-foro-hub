# ================================================
# CONFIGURACIÓN DEL SERVIDOR
# ================================================
server.port=8080

# ================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (usando variables)
# ================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/foro_hub_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================================
# CONFIGURACIÓN DE JPA/HIBERNATE
# ================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ================================================
# CONFIGURACIÓN DE FLYWAY (MIGRACIONES)
# ================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ================================================
# LOGGING
# ================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.alura.forohub=DEBUG

api.security.secret=${JWT_SECRET:1234567890abcdefghijklmnopqrstuvwxyz}
api.security.expiration=7200  # 2 horas en segundos
